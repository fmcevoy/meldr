# CI Workflow for meldr
#
# Pipeline:
#   Stage 1 (parallel): build, lint, format        — fast compilation & style checks
#   Stage 2 (parallel): unit-tests                  — needs build+lint to pass
#   Stage 3:            integration-tests (Docker)  — needs unit-tests to pass
#
# All integration tests run in Docker for consistent, isolated environments.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Stage 1: Fast checks (parallel) ──────────────────────────────

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: meldr

      - name: Build
        run: cargo build --manifest-path meldr/Cargo.toml

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: meldr

      - name: Clippy
        run: cargo clippy --manifest-path meldr/Cargo.toml --all-targets -- -D warnings

  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --manifest-path meldr/Cargo.toml --check

  # ── Stage 2: Unit tests (needs Stage 1) ─────────────────────────

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: [build, lint, format]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: meldr

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y git tmux

      - name: Configure git
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "CI"

      - name: Run unit tests
        run: cargo test --manifest-path meldr/Cargo.toml --bin meldr

  # ── Stage 3: All integration tests in Docker (needs Stage 2) ────

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Run all integration tests in Docker
        run: cd meldr && ./run-docker-tests.sh
