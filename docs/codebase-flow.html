<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meldr — Architecture &amp; Flows</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px}
h1{font-size:1rem;font-weight:600}
.sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.legend{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted)}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.main{display:flex;height:calc(100vh - 80px);overflow:hidden}
#ga{flex:1;overflow:auto;padding:16px}
svg{display:block;overflow:visible}
.edge{fill:none;stroke:#30363d;stroke-width:1.5;opacity:.5;transition:stroke .2s,stroke-width .2s,opacity .2s}
.node-text{font-family:'SFMono-Regular',Consolas,monospace;font-size:10px;pointer-events:none;dominant-baseline:central;text-anchor:middle;transition:opacity .2s}
.col-label{font-size:10px;fill:var(--muted);text-anchor:middle}
.rp{width:300px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.fl{padding:12px;border-bottom:1px solid var(--border);overflow-y:auto;max-height:45%}
.fh{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.fb{display:block;width:100%;text-align:left;background:none;border:1px solid transparent;border-radius:4px;padding:8px;color:var(--text);cursor:pointer;margin-bottom:3px;font-size:.7rem;font-family:'SFMono-Regular',Consolas,monospace;transition:all .15s;-webkit-tap-highlight-color:transparent}
.fb:hover,.fb:active{background:rgba(255,255,255,.04);border-color:var(--border)}
.fb.active{background:rgba(56,139,253,.1);border-color:#388bfd;color:#7cb8ff}
.sa{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.sh{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.fd{font-size:.7rem;color:var(--muted);margin-bottom:14px;line-height:1.5}
.step{display:flex;gap:8px;margin-bottom:14px}
.sn{flex-shrink:0;width:20px;height:20px;border-radius:50%;font-size:.6rem;display:flex;align-items:center;justify-content:center;font-weight:600;margin-top:1px}
.sb{flex:1}
.sl{font-size:.72rem;font-weight:600;font-family:'SFMono-Regular',Consolas,monospace;margin-bottom:2px}
.sf{font-size:.62rem;color:var(--muted);margin-bottom:3px}
.sd{font-size:.68rem;color:#6e7681;line-height:1.45}
.empty{font-size:.75rem;color:var(--muted);text-align:center;padding:32px 16px}
@media(max-width:640px){
  .main{flex-direction:column;height:auto;overflow:visible}
  #ga{padding:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:240px}
  .rp{width:100%;border-left:none;border-top:1px solid var(--border);max-height:none;overflow:visible}
  .fl{max-height:none;overflow:visible}
  .sa{overflow:visible;max-height:none}
  .fb{font-size:.75rem;padding:10px 8px}
}
</style>
</head>
<body>
<header>
  <h1>meldr — Architecture &amp; Flows</h1>
  <p class="sub">Pick a flow to highlight its path. Hover/tap nodes for details.</p>
  <div class="legend" id="legend"></div>
</header>
<div class="main">
  <div id="ga"></div>
  <div class="rp">
    <div class="fl"><div class="fh">Flows</div><div id="fb"></div></div>
    <div class="sa"><div class="sh">Steps</div><div id="sl"><p class="empty">Select a flow to trace its path through the codebase.</p></div></div>
  </div>
</div>
<script>
const DATA={name:"meldr",layers:[{id:"entry",label:"Entry",color:"#8b949e"},{id:"cli",label:"CLI",color:"#388bfd"},{id:"core",label:"Core",color:"#3fb950"},{id:"git",label:"Git",color:"#d29922"},{id:"tmux",label:"Tmux",color:"#bc8cff"}],nodes:[{id:"main",label:"main.rs",layer:"entry",file:"src/main.rs",description:"Arg rewriting (swaps reversed action/resource patterns) then routes to CLI handlers. Builds EffectiveConfig before every command."},{id:"cli.init",label:"cli/init.rs",layer:"cli",file:"src/cli/init.rs",description:"Creates meldr.toml and .meldr/state.json in the current directory."},{id:"cli.create",label:"cli/create.rs",layer:"cli",file:"src/cli/create.rs",description:"One-shot workspace creation: init + package add + optional worktree add."},{id:"cli.package",label:"cli/package.rs",layer:"cli",file:"src/cli/package.rs",description:"Add/remove/list packages (bare-cloned git repos)."},{id:"cli.worktree",label:"cli/worktree.rs",layer:"cli",file:"src/cli/worktree.rs",description:"Add/remove/open/list/scan worktrees."},{id:"cli.sync",label:"cli/sync.rs",layer:"cli",file:"src/cli/sync.rs",description:"Sync worktree branches with upstream (fetch + rebase/merge) with snapshot-based undo."},{id:"cli.status",label:"cli/status.rs",layer:"cli",file:"src/cli/status.rs",description:"Renders a color-coded dashboard of git status across all packages and worktrees."},{id:"cli.exec",label:"cli/exec.rs",layer:"cli",file:"src/cli/exec.rs",description:"Runs a command in every package worktree directory for the current branch."},{id:"cli.pr",label:"cli/pr.rs",layer:"cli",file:"src/cli/pr.rs",description:"Creates and shows status of coordinated PRs across packages."},{id:"cli.config",label:"cli/config_cmd.rs",layer:"cli",file:"src/cli/config_cmd.rs",description:"Get/set/unset config values at workspace or global scope."},{id:"core.workspace",label:"core/workspace.rs",layer:"core",file:"src/core/workspace.rs",description:"Parses meldr.toml. Resolves package list, finds workspace root, detects current worktree from cwd."},{id:"core.config",label:"core/config.rs",layer:"core",file:"src/core/config.rs",description:"5-layer config resolution: CLI flags > env vars > workspace toml > global toml > built-in defaults. Produces EffectiveConfig."},{id:"core.worktree",label:"core/worktree.rs",layer:"core",file:"src/core/worktree.rs",description:"~2100 lines. Main business logic: worktree create/remove, sync with conflict detection, parallel fetch via Rayon, tmux window setup."},{id:"core.state",label:"core/state.rs",layer:"core",file:"src/core/state.rs",description:"Manages .meldr/state.json — tracks active worktrees and sync metadata."},{id:"core.sync_history",label:"core/sync_history.rs",layer:"core",file:"src/core/sync_history.rs",description:"Saves pre-sync snapshots to .meldr/sync-snapshots/ for undo without git reflog complexity."},{id:"core.filter",label:"core/filter.rs",layer:"core",file:"src/core/filter.rs",description:"PackageFilter: applies --only, --exclude, --group flags across commands."},{id:"core.claude_prune",label:"core/claude_prune.rs",layer:"core",file:"src/core/claude_prune.rs",description:"Archives and purges Claude Code session state when a worktree is removed."},{id:"git",label:"git/ (GitOps)",layer:"git",file:"src/git/",description:"GitOps trait. RealGit uses subprocess git CLI (no libgit2). Key ops: bare clone, worktree add/remove, fetch, rebase/merge, conflict detection via git merge-tree --write-tree."},{id:"tmux",label:"tmux/ (TmuxOps)",layer:"tmux",file:"src/tmux/",description:"TmuxOps trait. RealTmux with 3 layout presets: default 9-pane (3 claude + 6 terminals), minimal 2-pane, editor-only. Custom layouts via template variables."}],edges:[{from:"main",to:"cli.init"},{from:"main",to:"cli.create"},{from:"main",to:"cli.package"},{from:"main",to:"cli.worktree"},{from:"main",to:"cli.sync"},{from:"main",to:"cli.status"},{from:"main",to:"cli.exec"},{from:"main",to:"cli.pr"},{from:"main",to:"cli.config"},{from:"cli.init",to:"core.workspace"},{from:"cli.create",to:"core.workspace"},{from:"cli.create",to:"core.config"},{from:"cli.create",to:"core.worktree"},{from:"cli.package",to:"core.workspace"},{from:"cli.package",to:"git"},{from:"cli.worktree",to:"core.worktree"},{from:"cli.worktree",to:"core.workspace"},{from:"cli.worktree",to:"core.config"},{from:"cli.sync",to:"core.worktree"},{from:"cli.status",to:"core.worktree"},{from:"cli.exec",to:"core.workspace"},{from:"cli.exec",to:"core.state"},{from:"cli.pr",to:"git"},{from:"cli.config",to:"core.config"},{from:"core.worktree",to:"git"},{from:"core.worktree",to:"tmux"},{from:"core.worktree",to:"core.state"},{from:"core.worktree",to:"core.sync_history"},{from:"core.worktree",to:"core.filter"},{from:"core.worktree",to:"core.workspace"},{from:"core.worktree",to:"core.config"},{from:"core.worktree",to:"core.claude_prune"},{from:"core.state",to:"core.workspace"}],flows:[{id:"worktree-add",label:"meldr worktree add <branch>",description:"Create coordinated git worktrees across all packages and open a tmux window with AI agent panes.",steps:[{node:"main",label:"Arg rewriting + config",detail:"Detects reversed patterns. Builds EffectiveConfig via 5-layer resolution."},{node:"cli.worktree",label:"cli/worktree.rs::add()",detail:"Resolves PackageFilter and leader package. Delegates to core."},{node:"core.workspace",label:"Manifest::load()",detail:"Reads meldr.toml — package list, git URLs, workspace settings."},{node:"core.state",label:"WorkspaceState::load()",detail:"Reads .meldr/state.json. Verifies no duplicate branch."},{node:"git",label:"fetch() parallel (Rayon)",detail:"Fetches origin for each package in parallel."},{node:"git",label:"worktree_add() sequential",detail:"git worktree add worktrees/<branch>/<pkg>/ per package, sequentially."},{node:"core.state",label:"state.add_worktree()",detail:"Records worktree in state.json: branch, paths, timestamp."},{node:"tmux",label:"create_window()",detail:"full=9-pane (3 claude + 6 terminals). minimal=2-pane. editor-only=1-pane. Launches agent in leader pkg."}]},{id:"sync",label:"meldr sync [--all]",description:"Fetch and rebase/merge branches with upstream. Pre-sync snapshot enables lossless undo.",steps:[{node:"main",label:"Resolve branch target",detail:"Detects branch from cwd, explicit arg, or all branches with --all."},{node:"cli.sync",label:"cli/sync.rs::run()",detail:"Passes branch list, strategy, and --merge flag to core."},{node:"core.sync_history",label:"save_snapshot()",detail:"Saves HEAD refs to .meldr/sync-snapshots/<branch>-<ts>/ before any changes."},{node:"git",label:"fetch() parallel",detail:"git fetch origin for all packages via Rayon."},{node:"git",label:"merge-tree conflict check",detail:"strategy=safe: git merge-tree --write-tree detects conflicts pre-rebase. Aborts cleanly if found."},{node:"git",label:"rebase or merge",detail:"git rebase origin/<branch> or git merge. Strategy: -X theirs / -X ours."},{node:"core.state",label:"update_sync_info()",detail:"Updates state.json with last-sync timestamp and ahead/behind counts."}]},{id:"create",label:"meldr create <name> -r <url>",description:"One-shot: init workspace, bare-clone packages, optionally create a worktree.",steps:[{node:"main",label:"Route to create",detail:"Reads --agent override. Merges into EffectiveConfig."},{node:"cli.create",label:"cli/create.rs::run()",detail:"Orchestrates three sub-operations sequentially."},{node:"cli.init",label:"init workspace",detail:"Creates meldr.toml and .meldr/state.json."},{node:"git",label:"git clone --bare",detail:"Bare-clones each -r URL into packages/<pkg>/. Enables multiple worktrees without branch switching."},{node:"core.workspace",label:"register packages",detail:"Writes [[package]] entries to meldr.toml."},{node:"core.worktree",label:"create_worktrees() if -b",detail:"Only runs if -b <branch> provided. Full worktree add + tmux setup."},{node:"tmux",label:"tmux window (if -b)",detail:"Opens workspace in tmux with AI agent panes."}]},{id:"worktree-remove",label:"meldr worktree remove <branch>",description:"Remove worktrees: dirty check, prune Claude session data, clean tmux.",steps:[{node:"cli.worktree",label:"cli/worktree.rs::remove()",detail:"Auto-detects branch from cwd. Reads --force and --no-claude-prune."},{node:"git",label:"dirty-state check",detail:"git status per package. Aborts if uncommitted changes and not --force."},{node:"core.claude_prune",label:"claude_prune() if enabled",detail:"Archives and purges Claude Code session state for this worktree."},{node:"git",label:"git worktree remove",detail:"git worktree remove worktrees/<branch>/<pkg>/ per package."},{node:"core.state",label:"state.remove_worktree()",detail:"Removes branch entry from state.json."},{node:"tmux",label:"kill tmux window",detail:"Kills the tmux window for this branch if one exists."}]},{id:"status",label:"meldr status",description:"Color-coded dashboard of git status across all packages and worktrees.",steps:[{node:"cli.status",label:"cli/status.rs::run()",detail:"Applies PackageFilter."},{node:"core.workspace",label:"Manifest::load()",detail:"Gets package list from meldr.toml."},{node:"core.state",label:"WorkspaceState::load()",detail:"Gets active worktrees and last-sync info."},{node:"git",label:"check_worktree_staleness()",detail:"Parallel Rayon fetch + git rev-list ahead/behind per package x branch."},{node:"git",label:"git status --short",detail:"Per-package dirty-file detection."}]},{id:"exec",label:"meldr exec <command>",description:"Run a shell command in every package worktree directory for the current branch.",steps:[{node:"cli.exec",label:"cli/exec.rs::run()",detail:"Detects current branch from cwd. Applies PackageFilter."},{node:"core.state",label:"find worktree dirs",detail:"Looks up paths from state.json for the current branch."},{node:"core.filter",label:"apply PackageFilter",detail:"Filters by --only/--exclude/--group. Spawns command per pkg."}]}]};
const COLS=[{id:'entry',label:'Entry',x:90,nodes:['main']},{id:'cli',label:'CLI',x:270,nodes:['cli.init','cli.create','cli.package','cli.worktree','cli.sync','cli.status','cli.exec','cli.pr','cli.config']},{id:'core',label:'Core',x:460,nodes:['core.workspace','core.config','core.worktree','core.state','core.sync_history','core.filter','core.claude_prune']},{id:'infra',label:'Git / Tmux',x:650,nodes:['git','tmux']}];
const NW=152,NH=28,PADY=48,SVG_H=560;
function layerColor(id){const n=DATA.nodes.find(n=>n.id===id);const l=DATA.layers.find(l=>l.id===n?.layer);return l?.color||'#8b949e';}
function hexRgb(h){return[1,3,5].map(i=>parseInt(h.slice(i,i+2),16)).join(',');}
const pos={};
COLS.forEach(col=>{const n=col.nodes.length;col.nodes.forEach((id,i)=>{const y=n===1?SVG_H/2:PADY+i*(SVG_H-2*PADY)/(n-1);pos[id]={x:col.x,y};});});
const leg=document.getElementById('legend');
DATA.layers.forEach(l=>{const d=document.createElement('div');d.className='li';d.innerHTML=`<div class="ld" style="background:${l.color}"></div>${l.label}`;leg.appendChild(d);});
const svgW=730;
const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
svg.setAttribute('viewBox',`0 0 ${svgW} ${SVG_H}`);
svg.style.width=svgW+'px';svg.style.height=SVG_H+'px';
document.getElementById('ga').appendChild(svg);
COLS.forEach(col=>{const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',col.x);t.setAttribute('y',18);t.setAttribute('class','col-label');t.textContent=col.label;svg.appendChild(t);});
const edgeEls={};
DATA.edges.forEach(e=>{const f=pos[e.from],t=pos[e.to];if(!f||!t)return;const x1=f.x+NW/2,y1=f.y,x2=t.x-NW/2,y2=t.y,cx=(x1+x2)/2;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);p.setAttribute('class','edge');svg.appendChild(p);edgeEls[`${e.from}->${e.to}`]=p;});
const nodeEls={};
DATA.nodes.forEach(node=>{const p=pos[node.id];if(!p)return;const c=layerColor(node.id);const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.style.cursor='pointer';const r=document.createElementNS('http://www.w3.org/2000/svg','rect');r.setAttribute('x',p.x-NW/2);r.setAttribute('y',p.y-NH/2);r.setAttribute('width',NW);r.setAttribute('height',NH);r.setAttribute('rx',4);r.setAttribute('fill',`rgba(${hexRgb(c)},.12)`);r.setAttribute('stroke',c);r.setAttribute('stroke-width','1');const tx=document.createElementNS('http://www.w3.org/2000/svg','text');tx.setAttribute('x',p.x);tx.setAttribute('y',p.y);tx.setAttribute('class','node-text');tx.setAttribute('fill',c);tx.textContent=node.label;g.appendChild(r);g.appendChild(tx);svg.appendChild(g);nodeEls[node.id]={g,r,tx};g.addEventListener('click',()=>{const sl=document.getElementById('sl');const existing=sl.querySelector('.node-detail');if(existing&&existing.dataset.id===node.id){existing.remove();return;}if(existing)existing.remove();const div=document.createElement('div');div.className='node-detail';div.dataset.id=node.id;div.style.cssText='background:#1c2333;border:1px solid '+c+';border-radius:6px;padding:10px;margin-bottom:12px;font-size:.7rem;line-height:1.5';div.innerHTML=`<div style="font-family:monospace;font-weight:600;color:${c};margin-bottom:3px">${node.label}</div><div style="color:var(--muted);font-size:.62rem;margin-bottom:5px">${node.file}</div><div style="color:#8b949e">${node.description}</div>`;sl.prepend(div);});});
const fbDiv=document.getElementById('fb');
DATA.flows.forEach(flow=>{const btn=document.createElement('button');btn.className='fb';btn.textContent=flow.label;btn.addEventListener('click',()=>selectFlow(flow,btn));fbDiv.appendChild(btn);});
function selectFlow(flow,btn){document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const flowNodes=[...new Set(flow.steps.map(s=>s.node))];const flowEdges=new Set();for(let i=0;i<flow.steps.length-1;i++){const a=flow.steps[i].node,b=flow.steps[i+1].node;if(a!==b)flowEdges.add(`${a}->${b}`);}Object.entries(nodeEls).forEach(([id,el])=>{const on=flowNodes.includes(id);el.r.style.opacity=on?'1':'0.1';el.tx.style.opacity=on?'1':'0.15';el.r.setAttribute('stroke-width',on?'2':'1');});Object.entries(edgeEls).forEach(([key,el])=>{if(flowEdges.has(key)){const c=layerColor(key.split('->')[0]);el.setAttribute('stroke',c);el.setAttribute('stroke-width','2.5');el.style.opacity='1';}else{el.setAttribute('stroke','#30363d');el.setAttribute('stroke-width','1.5');el.style.opacity='0.1';}});const sl=document.getElementById('sl');sl.innerHTML='';const desc=document.createElement('p');desc.className='fd';desc.textContent=flow.description;sl.appendChild(desc);flow.steps.forEach((step,i)=>{const node=DATA.nodes.find(n=>n.id===step.node);const c=layerColor(step.node);const div=document.createElement('div');div.className='step';div.innerHTML=`<div class="sn" style="background:rgba(${hexRgb(c)},.2);color:${c}">${i+1}</div><div class="sb"><div class="sl" style="color:${c}">${step.label}</div><div class="sf">${node?.file||''}</div><div class="sd">${step.detail}</div></div>`;sl.appendChild(div);});if(window.innerWidth<=640){setTimeout(()=>sl.scrollIntoView({behavior:'smooth',block:'start'}),100);}}
if(DATA.flows.length)selectFlow(DATA.flows[0],fbDiv.firstChild);
</script>
</body>
</html>
